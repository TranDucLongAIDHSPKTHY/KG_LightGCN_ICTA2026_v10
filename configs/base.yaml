# configs/base.yaml — v10-fix
# BASE CONFIGURATION — dùng chung cho TẤT CẢ models (fairness constraint)
#
# FIX v10-fix:
#   [WARNING-8] num_workers: 0 (default an toàn cho mọi OS)
#               num_workers=4 gây lỗi trên Windows (fork issue).
#               Để dùng multi-worker: đặt NUM_WORKERS=4 trong .env
#               hoặc override qua CLI: --override train.num_workers=4
#
# Override priority (high → low):
#   CLI --override  >  model YAML  >  this file  >  .env  >  default
# ─────────────────────────────────────────────────────────────────────────────

dataset:
  name: amazon-book # amazon-book | yelp2018
  data_source: kgat_repo # KGAT repo là nguồn DUY NHẤT — v10
  raw_dir: /data/phuongtran/project_v10/raw
  data_dir: /data/phuongtran/project_v10/unified

  cold_split: null # null | cold_10 | cold_20 | cold_30
  kg_type: full # full | category | brand | none

  # Split protocol — gộp KGAT train+test rồi chia lại 80/10/10, seed=42
  split_protocol: "80/10/10-unified"
  split_seed: 42

  # File names
  train_file: train.txt
  valid_file: valid.txt
  test_file: test.txt
  kg_file: kg_final.txt # KGAT format

model:
  name: lightgcn
  embedding_dim: 64 # HARD CONSTRAINT — không được override
  n_layers: 3

train:
  epochs: 1000
  batch_size: 2048
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 1.0e-4
  neg_samples: 1
  early_stopping_patience: 10
  early_stopping_metric: recall@20
  seed: 42
  device: auto # auto | cpu | cuda | cuda:0
  # [WARNING-8 FIX] num_workers=0 làm default an toàn trên mọi OS.
  # Để tăng performance trên Linux: set NUM_WORKERS=4 trong .env
  num_workers: 4
  max_grad_norm: 1.0 # gradient clipping — tất cả models

eval:
  batch_size: 2048
  top_k: [10, 20]
  eval_protocol: full # "full" = toàn bộ items; "sampled" chỉ Appendix
  eval_interval: 5

contrastive:
  temperature: 0.2 # τ = 0.2 cố định theo Fairness Sheet
  lambda_cl: 0.5

logging:
  log_dir: results/logs
  checkpoint_dir: results/checkpoints
  result_dir: results/tables
  log_interval: 1

reproducibility:
  seeds: [42, 0, 1, 2, 3] # 5 seeds → report mean ± std
