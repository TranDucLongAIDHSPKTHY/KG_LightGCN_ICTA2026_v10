# configs/model/kgat.yaml — v10
# KGAT — Wang et al., KDD 2019
# Data source: KGAT repo (kg_final.txt)
model:
  name: kgat
  n_layers: 3
  kg_n_layers: 2
  relation_dim: 64
  agg_type: bi-interaction
  kg_reg: 1.0e-5
  node_dropout: 0.0
  mess_dropout: 0.0

train:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  early_stopping_patience: 10
  kg_batch_size: 2048
